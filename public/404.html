<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>
    // Preserve the full path so GitHub Pages routes back to the right repo
    var path = window.location.pathname;
    var base = '/ohtocode/';
    if (!path.startsWith(base)) {
      window.location.replace(base);
    } else {
      sessionStorage.setItem('redirect', path);
      window.location.replace(base);
    }
  </script>
  <title>Redirecting...</title>
</head>

<body></body>

</html>
